<!DOCTYPE html>
<html>
<head>
    <title>PSU Smart Chatbot</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f4f9; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #chat { height: 400px; border: 1px solid #eee; overflow-y: scroll; padding: 15px; margin-bottom: 15px; background: #fafafa; border-radius: 8px; }
        .controls { display: flex; gap: 10px; }
        input[type="text"] { padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        #username { width: 120px; }
        #message { flex: 1; }
        button { padding: 10px 25px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .msg-line { margin-bottom: 10px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="container">
        <h2>PSU Smart Chatbot</h2>
        <div style="margin-bottom: 10px;">
            <input id="username" type="text" placeholder="ชื่อของคุณ...">
        </div>
        <div id="chat"></div>
        <div class="controls">
            <input id="message" type="text" placeholder="พิมพ์คำถามที่นี่..." autocomplete="off">
            <button onclick="sendData()">ส่ง</button>
        </div>
    </div>

    <script>
        const socket = io();
        const chat = document.getElementById('chat');

        socket.on('message', function(data) {
            const p = document.createElement('div');
            p.className = 'msg-line';
            p.innerHTML = `<strong>${data.user}:</strong> ${data.msg}`;
            chat.appendChild(p);
            chat.scrollTop = chat.scrollHeight;
        });

        function sendData() {
            const user = document.getElementById('username').value || "User";
            const msgInput = document.getElementById('message');

            if (msgInput.value.trim() !== "") {
                socket.send({type: 'text', user: user, msg: msgInput.value});
                msgInput.value = '';
            }
        }

        // กด Enter เพื่อส่ง
        document.getElementById("message").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendData();
            }
        });
    </script>
</body>
</html>
